---
# GCP Admin Activity audit logs stopped arriving.
#
# This feed is the platform's view of its own control plane and every other
# project's. Its absence means the org-level Cloud Logging sink is gone, disabled,
# or misfiltered -- which is not just an outage, it is a documented ATTACK
# TECHNIQUE (stratus gcp.defense-evasion.delete-logging-sink /
# .disable-logging-sink / .disable-audit-logs). Blinding the SIEM is step one of a
# competent intrusion.
#
# So this rule is doing double duty: pipeline health AND defense-evasion
# detection. Treat it as hostile until proven boring.
#
# Admin Activity logs cannot be disabled at the source (GCP always writes them),
# so silence here means the ROUTE was broken, not the logging. Someone changed
# something.
alert_name: "deadman_gcp_audit_feed"
alert_type: "deadman"
category: "deadman"
criteria: "source='gcp_audit' AND JSON_VALUE(details.audit_log_type) = 'activity'"
lookback_minutes: 120
threshold: 0
severity: "CRITICAL"
summary: "DEADMAN: no GCP Admin Activity audit logs in 2h -- the org sink may be deleted, disabled, or refiltered"
event_snippet: "last event: {{summary}}"
event_sample_count: 1
tags:
  - "deadman"
  - "gcp"
  - "defense-evasion"
