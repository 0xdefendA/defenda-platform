steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    entrypoint: 'bash'
    secretEnv: ['FIREBASE_API_KEY']
    args:
      - '-c'
      - |
        docker build --platform=linux/amd64 -t $_IMAGE -f services/respondA/Dockerfile \
        --build-arg VITE_FIREBASE_API_KEY="$$FIREBASE_API_KEY" \
        --build-arg VITE_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN \
        --build-arg VITE_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID \
        --build-arg VITE_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET \
        --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID \
        --build-arg VITE_FIREBASE_APP_ID=$_FIREBASE_APP_ID \
        services/respondA
    dir: .

  # Push the Docker image to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_IMAGE

images:
  - $_IMAGE

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/firebase-api-key/versions/latest
    env: 'FIREBASE_API_KEY'

options:
 dynamic_substitutions: true
 logging: CLOUD_LOGGING_ONLY
 substitutionOption: 'ALLOW_LOOSE'
